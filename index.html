<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a1a; padding: 24px 16px; }
  .container { max-width: 860px; margin: 0 auto; }

  .header { margin-bottom: 20px; }
  .header h1 { font-size: 20px; font-weight: 600; }
  .header p { font-size: 13px; color: #666; margin-top: 4px; }
  .deadline { display:inline-flex; align-items:center; gap:5px; margin-top:10px; font-size:12px; padding:4px 12px; border-radius:20px; background:#fff8e6; color:#a06000; border:1px solid #ffe8a0; }

  .notice { margin-top:14px; padding:12px 16px; border-radius:10px; border:1px solid #ffe8a0; background:#fff8e6; color:#7a4800; font-size:13px; line-height:1.6; }
  .notice strong { font-weight:600; display:block; margin-bottom:4px; }

  .steps { margin-top:12px; display:flex; gap:8px; flex-wrap:wrap; }
  .step { display:flex; align-items:center; gap:7px; font-size:12px; color:#555; background:#fff; padding:6px 14px; border-radius:20px; border:1px solid #e0e0e0; }
  .step-num { width:20px; height:20px; border-radius:50%; background:#1a1a1a; color:#fff; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:600; flex-shrink:0; }

  .form-btn { display:inline-flex; align-items:center; gap:8px; margin-top:16px; padding:10px 24px; border-radius:24px; background:#1a1a1a; color:#fff; font-size:14px; font-weight:500; text-decoration:none; transition:background 0.15s; }
  .form-btn:hover { background:#333; }

  .divider { height:1px; background:#e0e0e0; margin:24px 0 16px; }

  .filter-section { margin-bottom:12px; }
  .filter-label { font-size:11px; color:#888; margin-bottom:6px; }
  .filters { display:flex; flex-wrap:wrap; gap:6px; }
  .filter-btn { font-size:12px; padding:4px 14px; border-radius:20px; border:1px solid #ddd; background:#fff; color:#555; cursor:pointer; transition:all 0.15s; }
  .filter-btn.active { background:#1a1a1a; color:#fff; border-color:#1a1a1a; }
  .filter-btn:hover:not(.active) { border-color:#aaa; }

  .color-filters { display:flex; flex-wrap:wrap; gap:7px; margin-bottom:16px; }
  .color-dot { width:26px; height:26px; border-radius:50%; border:2px solid transparent; cursor:pointer; transition:all 0.15s; position:relative; }
  .color-dot.active { border-color:#1a1a1a; transform:scale(1.15); }
  .color-dot:hover::after { content:attr(title); position:absolute; bottom:30px; left:50%; transform:translateX(-50%); background:#1a1a1a; color:#fff; border-radius:4px; padding:2px 8px; font-size:11px; white-space:nowrap; pointer-events:none; }

  .count { font-size:12px; color:#888; margin-bottom:12px; }

  .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(175px, 1fr)); gap:10px; }

  .card { background:#fff; border:1px solid #e8e8e8; border-radius:12px; padding:14px; text-decoration:none; display:block; transition:border-color 0.15s, box-shadow 0.15s; }
  .card:hover { border-color:#aaa; box-shadow:0 2px 8px rgba(0,0,0,0.06); }

  .brand { font-size:10px; font-weight:600; color:#888; letter-spacing:0.08em; text-transform:uppercase; }
  .name { font-size:13px; font-weight:600; color:#1a1a1a; margin:4px 0 2px; line-height:1.35; }
  .color-row { display:flex; align-items:center; gap:6px; margin-top:7px; }
  .dot { width:11px; height:11px; border-radius:50%; border:1px solid rgba(0,0,0,0.1); flex-shrink:0; }
  .color-name { font-size:11px; color:#666; }
  .model { font-size:10px; color:#aaa; margin-top:4px; }
  .link-row { margin-top:10px; padding-top:10px; border-top:1px solid #f0f0f0; display:flex; align-items:center; justify-content:space-between; }
  .link-btn { font-size:11px; color:#0066cc; display:flex; align-items:center; gap:3px; }
  .size-tip { font-size:10px; color:#a06000; display:flex; align-items:center; gap:3px; }

  .no-results { padding:3rem; text-align:center; color:#aaa; font-size:14px; }

  @media (max-width: 480px) {
    .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
    .steps { flex-direction: column; }
  }

const brands = ['全部', ...new Set(shoes.map(s => s.brand))];
const colors = [...new Set(shoes.map(s => s.color))];
let activeBrand = '全部';
let activeColor = null;

const brandContainer = document.getElementById('brand-filters');
brands.forEach(b => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn' + (b === '全部' ? ' active' : '');
  btn.textContent = b;
  btn.onclick = () => {
    activeBrand = b;
    document.querySelectorAll('.filter-btn').forEach(x => x.classList.remove('active'));
    btn.classList.add('active');
    render();
  };
  brandContainer.appendChild(btn);
});

const colorContainer = document.getElementById('color-filters');
colors.forEach(c => {
  const dot = document.createElement('div');
  dot.className = 'color-dot';
  dot.title = c;
  dot.style.background = COLOR_MAP[c] || '#ccc';
  if (LIGHT_COLORS.includes(c)) dot.style.boxShadow = 'inset 0 0 0 1.5px #ccc';
  dot.onclick = () => {
    if (activeColor === c) { activeColor = null; dot.classList.remove('active'); }
    else { activeColor = c; document.querySelectorAll('.color-dot').forEach(x => x.classList.remove('active')); dot.classList.add('active'); }
    render();
  };
  colorContainer.appendChild(dot);
});

function render() {
  const filtered = shoes.filter(s => {
    if (activeBrand !== '全部' && s.brand !== activeBrand) return false;
    if (activeColor && s.color !== activeColor) return false;
    return true;
  });
  document.getElementById('count-label').textContent = `顯示 ${filtered.length} 款`;
  const grid = document.getElementById('grid');
  if (filtered.length === 0) { grid.innerHTML = '<div class="no-results">沒有符合條件的款式</div>'; return; }
  grid.innerHTML = filtered.map(s => `
    <a class="card" href="${s.url}" target="_blank">
      <div class="brand">${s.brand}</div>
      <div class="name">${s.name}</div>
      <div class="color-row">
        <div class="dot" style="background:${COLOR_MAP[s.color]||'#ccc'};${LIGHT_COLORS.includes(s.color)?'box-shadow:inset 0 0 0 1px #bbb;':''}"></div>
        <div class="color-name">${s.color}</div>
      </div>
      <div class="model">${s.model}</div>
      <div class="link-row">
        <div class="link-btn">🔗 查看官網</div>
        <div class="size-tip">📏 確認尺寸</div>
      </div>
    </a>
  `).join('');
}
