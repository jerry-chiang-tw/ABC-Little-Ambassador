let currentUser = null;

function doLogin() {
  const pw = document.getElementById('password-input').value.trim();
  const err = document.getElementById('login-error');
  if(USERS[pw]) {
    currentUser = USERS[pw];
    err.textContent = '';
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-screen').style.display = 'block';
    renderMain();
  } else {
    err.textContent = '密碼錯誤，請再試一次';
  }
}
document.getElementById('password-input').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

function doLogout() {
  currentUser = null;
  document.getElementById('main-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('password-input').value = '';
  document.getElementById('shoe-groups').innerHTML = '';
}

function renderMain() {
  const u = currentUser;
  document.getElementById('user-title').textContent = u.name + ' 的選鞋清單';
  document.getElementById('user-sub').textContent = u.sub;
  const container = document.getElementById('shoe-groups');
  container.innerHTML = '';
  u.groups.forEach(group => {
    const labelEl = document.createElement('div');
    labelEl.className = 'group-label';
    labelEl.textContent = group.label;
    container.appendChild(labelEl);
    const grid = document.createElement('div');
    grid.className = 'grid';
    group.items.forEach(item => grid.appendChild(makeCard(item)));
    container.appendChild(grid);
  });
}

function makeCard(g) {
  const hasMulti = g.variants.length > 1;
  const card = document.createElement('div');
  card.className = 'card';

  const imgWrap = document.createElement('div');
  imgWrap.className = 'card-img-wrap';
  g.variants.forEach((v, i) => {
    const img = document.createElement('img');
    img.className = 'card-img' + (i===0?' active':'');
    img.src = 'images/' + v.img;
    img.alt = g.name;
    img.loading = 'lazy';
    img.onerror = function(){ this.style.display='none'; };
    imgWrap.appendChild(img);
  });
  if(hasMulti) {
    const badge = document.createElement('div');
    badge.className = 'only-badge';
    badge.textContent = '只選一色';
    imgWrap.appendChild(badge);
  }
  if(g.note) {
    const nb = document.createElement('div');
    nb.className = 'note-badge';
    nb.textContent = g.note;
    imgWrap.appendChild(nb);
  }
  card.appendChild(imgWrap);

  const body = document.createElement('div');
  body.className = 'card-body';
  body.innerHTML = `<div class="brand">${g.brand}</div><div class="name">${g.name}</div>`;

  const selector = document.createElement('div');
  selector.className = 'color-selector';
  const colorLabel = document.createElement('div');
  colorLabel.className = 'selected-color';
  const modelLabel = document.createElement('div');
  modelLabel.className = 'model';

  // 尺寸標籤
  const sizesRow = document.createElement('div');
  sizesRow.className = 'sizes-row';
  (g.sizes||[]).forEach(s => {
    const tag = document.createElement('span');
    tag.className = 'size-tag';
    tag.textContent = s;
    sizesRow.appendChild(tag);
  });

  const linkRow = document.createElement('div');
  linkRow.className = 'link-row';

  function updateActive(idx) {
    const v = g.variants[idx];
    imgWrap.querySelectorAll('.card-img').forEach((img,i) => img.classList.toggle('active', i===idx));
    colorLabel.textContent = v.color;
    modelLabel.textContent = v.model;
    linkRow.innerHTML = `<a class="link-btn" href="${v.url}" target="_blank">🔗 查看官網</a>`;
    selector.querySelectorAll('.cs-dot').forEach((d,i) => d.classList.toggle('active', i===idx));
  }

  g.variants.forEach((v, i) => {
    const dot = document.createElement('div');
    dot.className = 'cs-dot' + (i===0?' active':'');
    dot.style.background = COLOR_MAP[v.color]||'#ccc';
    dot.setAttribute('data-label', v.color);
    if(LIGHT.includes(v.color)) dot.style.boxShadow='inset 0 0 0 1.5px #ccc';
    dot.onclick = () => updateActive(i);
    selector.appendChild(dot);
  });

  body.appendChild(selector);
  body.appendChild(colorLabel);
  body.appendChild(modelLabel);
  if(g.note) {
    const sn = document.createElement('div');
    sn.className = 'size-note-text';
    sn.textContent = '⚠️ ' + g.note;
    body.appendChild(sn);
  }
  body.appendChild(sizesRow);
  body.appendChild(linkRow);
  card.appendChild(body);
  updateActive(0);
  return card;
}
</script>
</body>
</html>
